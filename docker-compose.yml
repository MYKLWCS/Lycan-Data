version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Lycan-Data — full infrastructure stack
# ─────────────────────────────────────────────────────────────────────────────
# Services:
#   postgres    PostgreSQL 18 + Apache AGE (graph) + pgvector
#   garnet      Microsoft Garnet (Redis-compatible cache / queue)
#   typesense   Full-text + filter search (replaced MeiliSearch BSL 1.1)
#   qdrant      Vector database for ML-based embeddings & dedup
#   pulsar      Apache Pulsar — high-throughput event streaming
#   tor-1/2/3   Tor proxy pool (3 independent circuits)
#   flaresolverr Cloudflare JS-challenge solver
#   api         FastAPI application server
#   worker      Background workers (dispatcher, ingest, dedup, enrich)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL + Apache AGE + pgvector ───────────────────────────────────
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lycan}
      POSTGRES_USER: ${POSTGRES_USER:-lycan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lycan}"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
    restart: unless-stopped

  # ── Garnet (Redis-compatible, replaces Dragonfly) ─────────────────────────
  garnet:
    image: ghcr.io/microsoft/garnet:latest
    ulimits:
      memlock: -1
    volumes:
      - garnet_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "echo PING | nc -q1 localhost 6379 | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1"
    restart: unless-stopped

  # ── Typesense (full-text + filter search — replaced MeiliSearch BSL 1.1) ──
  typesense:
    image: typesense/typesense:27.0
    command: >
      --data-dir /data
      --api-key ${TYPESENSE_API_KEY:-changeme}
      --listen-port 8108
      --enable-cors
    volumes:
      - typesense_data:/data
    ports:
      - "8108:8108"
    healthcheck:
      test: ["CMD-SHELL", "grep -c 'typesense' /proc/1/cmdline || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1"
    restart: unless-stopped

  # ── Qdrant (vector database) ──────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"   # HTTP / REST
      - "6334:6334"   # gRPC
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Apache Pulsar (event streaming / message bus) ─────────────────────────
  pulsar:
    image: apachepulsar/pulsar:3.3.0
    command: bin/pulsar standalone
    environment:
      PULSAR_MEM: "-Xms512m -Xmx1g"
    volumes:
      - pulsar_data:/pulsar/data
    ports:
      - "6650:6650"   # broker
      - "8082:8080"   # admin
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/admin/v2/clusters | grep -q standalone"]
      interval: 15s
      timeout: 10s
      retries: 12
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1"
    restart: unless-stopped

  # ── Tor proxy instances (3 independent circuits) ──────────────────────────
  tor-1:
    image: dperson/torproxy:latest
    environment:
      TOR_CONTROL_PORT: "9051"
      TOR_CONTROL_PASSWD: ${TOR_CONTROL_PASSWORD:-changeme}
    ports:
      - "9050:9050"
      - "9051:9051"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    restart: unless-stopped

  tor-2:
    image: dperson/torproxy:latest
    environment:
      TOR_CONTROL_PORT: "9053"
      TOR_CONTROL_PASSWD: ${TOR_CONTROL_PASSWORD:-changeme}
    ports:
      - "9052:9050"
      - "9053:9051"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    restart: unless-stopped

  tor-3:
    image: dperson/torproxy:latest
    environment:
      TOR_CONTROL_PORT: "9055"
      TOR_CONTROL_PASSWD: ${TOR_CONTROL_PASSWORD:-changeme}
    ports:
      - "9054:9050"
      - "9055:9051"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    restart: unless-stopped

  # ── FlareSolverr (Cloudflare / JS challenge bypass) ───────────────────────
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    environment:
      LOG_LEVEL: info
      LOG_HTML: "false"
      CAPTCHA_SOLVER: none
      TZ: America/New_York
    ports:
      - "8191:8191"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8191/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── API server ────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.app
    command: >
      uvicorn api.main:app
      --host 0.0.0.0
      --port 8000
      --workers 2
      --proxy-headers
      --log-level info
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-lycan}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-lycan}
      CACHE_URL: redis://garnet:6379/0
      TYPESENSE_URL: http://typesense:8108
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY:-changeme}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:8000}
      SECRET_KEY: ${SECRET_KEY:-changeme-32-chars-minimum-please}
      API_KEYS: ${API_KEYS:-}
      API_AUTH_ENABLED: ${API_AUTH_ENABLED:-true}
      TOR_CONTROL_PASSWORD: ${TOR_CONTROL_PASSWORD:-changeme}
      TOR1_SOCKS: socks5://tor-1:9050
      TOR1_CONTROL_HOST: tor-1
      TOR2_SOCKS: socks5://tor-2:9050
      TOR2_CONTROL_HOST: tor-2
      TOR3_SOCKS: socks5://tor-3:9050
      TOR3_CONTROL_HOST: tor-3
      FLARESOLVERR_URL: http://flaresolverr:8191
      LOG_LEVEL: info
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      garnet:
        condition: service_healthy
      typesense:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      flaresolverr:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/system/health | grep -q ok"]
      interval: 15s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2"
    restart: unless-stopped

  # ── Background workers ────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.app
    command: python worker.py --workers 4
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-lycan}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-lycan}
      CACHE_URL: redis://garnet:6379/0
      TYPESENSE_URL: http://typesense:8108
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY:-changeme}
      SECRET_KEY: ${SECRET_KEY:-changeme-32-chars-minimum-please}
      TOR_CONTROL_PASSWORD: ${TOR_CONTROL_PASSWORD:-changeme}
      TOR1_SOCKS: socks5://tor-1:9050
      TOR1_CONTROL_HOST: tor-1
      TOR1_CONTROL_PORT: "9051"
      TOR2_SOCKS: socks5://tor-2:9050
      TOR2_CONTROL_HOST: tor-2
      TOR2_CONTROL_PORT: "9053"
      TOR3_SOCKS: socks5://tor-3:9050
      TOR3_CONTROL_HOST: tor-3
      TOR3_CONTROL_PORT: "9055"
      FLARESOLVERR_URL: http://flaresolverr:8191
      LOG_LEVEL: info
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      garnet:
        condition: service_healthy
      typesense:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
    restart: unless-stopped

volumes:
  postgres_data:
  garnet_data:
  typesense_data:
  qdrant_data:
  pulsar_data:
