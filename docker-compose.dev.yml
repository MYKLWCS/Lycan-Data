version: "3.9"

services:
  postgres:
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: lycan_dev

  api:
    build: .
    command: uvicorn api.main:app --reload --host 0.0.0.0 --port 8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DEBUG: "true"
    depends_on:
      postgres:
        condition: service_healthy
      dragonfly:
        condition: service_healthy
