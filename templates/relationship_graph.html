<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lycan OSINT — Relationship Graph</title>
<link rel="stylesheet" href="/static/style.css">
<style>
.graph-page { display: flex; height: calc(100vh - 60px); }
.graph-sidebar {
  width: 280px; min-width: 280px; background: var(--bg2);
  border-right: 1px solid var(--border); padding: 16px;
  overflow-y: auto; display: flex; flex-direction: column; gap: 16px;
}
.graph-sidebar h3 {
  font-size: 11px; font-weight: 600; color: var(--accent);
  text-transform: uppercase; letter-spacing: 0.5px; margin: 0 0 8px 0;
}
.filter-group { display: flex; flex-direction: column; gap: 4px; }
.filter-group label { font-size: 11px; color: var(--text-dim); font-family: var(--mono); }
.filter-group input[type="range"] { width: 100%; accent-color: var(--accent); }
.filter-group .range-value { font-size: 11px; color: var(--accent); font-family: var(--mono); text-align: right; }
.toggle-row { display: flex; align-items: center; justify-content: space-between; }
.toggle-row label { font-size: 12px; color: var(--text-dim); }
.toggle-row input[type="checkbox"] { accent-color: var(--accent); }
.legend-section { border-top: 1px solid var(--border); padding-top: 12px; }
#legend-items { display: flex; flex-direction: column; gap: 4px; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-dim); font-family: var(--mono); }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

.graph-main { flex: 1; display: flex; flex-direction: column; }
.graph-toolbar {
  display: flex; gap: 8px; padding: 12px 16px;
  border-bottom: 1px solid var(--border); background: var(--bg);
}
.graph-toolbar input {
  flex: 1; background: var(--bg2); border: 1px solid var(--border); color: var(--text);
  padding: 8px 12px; border-radius: var(--radius); font-family: var(--font); font-size: 13px; outline: none;
}
.graph-toolbar input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-lo); }
.graph-toolbar button {
  background: var(--accent); border: none; color: var(--bg);
  padding: 8px 16px; border-radius: var(--radius); font-family: var(--font);
  font-size: 13px; font-weight: 600; cursor: pointer;
}
.graph-toolbar button:hover { opacity: 0.85; }
.graph-toolbar button:disabled { opacity: 0.4; cursor: not-allowed; }

.graph-container {
  position: relative; flex: 1; background: var(--bg2); overflow: hidden;
}
.graph-canvas { width: 100%; height: 100%; }
.graph-controls {
  position: absolute; top: 12px; right: 12px;
  display: flex; flex-direction: column; gap: 6px; z-index: 10;
}
.graph-controls button {
  background: var(--bg3); border: 1px solid var(--border2); color: var(--text);
  width: 36px; height: 36px; border-radius: var(--radius);
  cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center; transition: all 0.15s;
}
.graph-controls button:hover { background: var(--accent-lo); border-color: var(--accent); color: var(--accent); }
.graph-info {
  position: absolute; bottom: 12px; left: 12px;
  background: rgba(6,8,12,0.9); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 10px 14px;
  font-family: var(--mono); font-size: 11px; color: var(--text-dim); z-index: 10;
}
.graph-info .stat { color: var(--accent); font-weight: 600; }
.graph-info .sep { color: var(--border2); margin: 0 6px; }

.node-panel {
  position: absolute; top: 12px; left: 12px;
  background: rgba(6,8,12,0.95); border: 1px solid var(--border2);
  border-radius: var(--radius); padding: 16px; width: 260px;
  max-height: calc(100% - 24px); overflow-y: auto; z-index: 20; display: none;
}
.node-panel.visible { display: block; }
.node-panel .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.node-panel .panel-title { font-weight: 600; color: var(--text); font-size: 14px; }
.node-panel .panel-close { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 18px; }
.node-panel .panel-close:hover { color: var(--red); }
.node-panel .panel-label {
  display: inline-block; background: var(--accent-lo); color: var(--accent);
  padding: 2px 8px; border-radius: 2px; font-size: 11px; font-family: var(--mono); margin-bottom: 8px;
}
.node-panel .panel-props dt { color: var(--text-dim); font-size: 11px; font-family: var(--mono); margin-top: 6px; }
.node-panel .panel-props dd { color: var(--text); font-size: 12px; margin-left: 0; }
.btn-expand-node {
  display: block; width: 100%; margin-top: 12px;
  background: var(--accent-lo); border: 1px solid var(--accent2); color: var(--accent);
  padding: 8px; border-radius: var(--radius); font-family: var(--font);
  font-size: 12px; font-weight: 600; cursor: pointer; text-align: center;
}
.btn-expand-node:hover { background: var(--accent); color: var(--bg); }

#tooltip {
  display: none; position: fixed; z-index: 100;
  background: rgba(6,8,12,0.95); border: 1px solid var(--border2);
  border-radius: var(--radius); padding: 8px 12px;
  font-size: 11px; color: var(--text-dim); font-family: var(--mono);
  pointer-events: none; max-width: 260px; line-height: 1.6;
}
.context-menu {
  position: fixed; z-index: 200;
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: var(--radius); overflow: hidden;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5); min-width: 180px;
}
.ctx-item {
  padding: 8px 14px; font-size: 12px; color: var(--text);
  cursor: pointer; font-family: var(--font);
}
.ctx-item:hover { background: var(--accent-lo); color: var(--accent); }
</style>
</head>
<body>
<div class="layout">
  <nav class="sidebar">
    <div class="logo">
      <span class="logo-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 12l10 10 10-10Z"/><circle cx="12" cy="12" r="3"/></svg></span>
      <span class="logo-text">LYCAN</span>
    </div>
    <div class="nav-label">INTELLIGENCE</div>
    <a href="/" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg> Search</a>
    <a href="/ui/persons" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg> Persons</a>
    <a href="/ui/graph" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="2"/><circle cx="6" cy="6" r="2"/><circle cx="18" cy="6" r="2"/><circle cx="6" cy="18" r="2"/><circle cx="18" cy="18" r="2"/><line x1="12" y1="12" x2="6" y2="6"/><line x1="12" y1="12" x2="18" y2="6"/><line x1="12" y1="12" x2="6" y2="18"/><line x1="12" y1="12" x2="18" y2="18"/></svg> Knowledge Graph</a>
    <a href="/ui/relationships" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg> Relationships</a>
    <div class="nav-label">SYSTEM</div>
    <a href="/ui/activity" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg> Activity</a>
    <a href="/docs" class="nav-item" target="_blank"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg> API Docs</a>
    <div class="sidebar-bottom">
      <div class="status-row"><span class="dot green"></span><span>System Online</span></div>
    </div>
  </nav>

  <main class="main" style="padding:0;overflow:hidden;">
    <div class="graph-page">
      <!-- Filter sidebar -->
      <div class="graph-sidebar">
        <div>
          <h3>Filters</h3>
          <div class="filter-group">
            <label>Min Confidence: <span id="conf-value">0%</span></label>
            <input type="range" id="filter-confidence" min="0" max="100" value="0">
          </div>
          <div class="filter-group" style="margin-top:8px;">
            <label>Min Strength: <span id="str-value">0</span></label>
            <input type="range" id="filter-strength" min="0" max="100" value="0">
          </div>
        </div>

        <div>
          <h3>Display</h3>
          <div class="toggle-row">
            <label>Show labels</label>
            <input type="checkbox" id="toggle-labels" checked>
          </div>
          <div class="toggle-row" style="margin-top:6px;">
            <label>Show photos</label>
            <input type="checkbox" id="toggle-photos" checked>
          </div>
        </div>

        <div>
          <h3>Actions</h3>
          <button id="btn-export" style="width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:8px;border-radius:var(--radius);cursor:pointer;font-size:12px;">Export PNG</button>
        </div>

        <div class="legend-section">
          <h3>Legend</h3>
          <div id="legend-items"></div>
        </div>
      </div>

      <!-- Main graph area -->
      <div class="graph-main">
        <div class="graph-toolbar">
          <input type="text" id="search-input" placeholder="Search person by name..." autocomplete="off">
          <button id="btn-search">Load Graph</button>
        </div>

        <div class="graph-container" id="graph-container">
          <canvas class="graph-canvas" id="graph-canvas"></canvas>
          <div class="graph-controls">
            <button id="btn-zoom-in" title="Zoom in">+</button>
            <button id="btn-zoom-out" title="Zoom out">-</button>
            <button id="btn-reset" title="Reset view">R</button>
            <button id="btn-fit" title="Fit all">F</button>
          </div>
          <div class="node-panel" id="node-panel">
            <div class="panel-header">
              <span class="panel-title" id="panel-title"></span>
              <button class="panel-close" id="panel-close">&times;</button>
            </div>
            <span class="panel-label" id="panel-label"></span>
            <dl class="panel-props" id="panel-props"></dl>
            <button class="btn-expand-node">Expand Network</button>
          </div>
          <div class="graph-info">
            <span class="stat" id="node-count">0</span> nodes
            <span class="sep">|</span>
            <span class="stat" id="edge-count">0</span> edges
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<div id="tooltip"></div>

<script src="/static/relationship_graph.js"></script>
</body>
</html>
