name: CI

on:
  push:
    branches: ["master", "main", "dev/**", "feature/**"]
  pull_request:
    branches: ["master", "main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: "postgresql+asyncpg://lycan:lycan@localhost:5432/lycan_test"
  REDIS_URL: "redis://localhost:6379/0"
  MEILI_URL: "http://localhost:7700"
  MEILI_MASTER_KEY: ""
  SECRET_KEY: "ci-test-secret-key-not-for-production"
  ENVIRONMENT: "test"
  PYTHONPATH: "."

jobs:
  # ── 1. Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: [self-hosted, lycan]
    steps:
      - uses: actions/checkout@v4

      - name: Ruff lint
        run: |
          .venv/bin/python -m pip install --quiet ruff
          .venv/bin/python -m ruff check . --output-format=github

      - name: Ruff format check
        run: .venv/bin/python -m ruff format --check .

  # ── 2. Tests ─────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: [self-hosted, lycan]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          .venv/bin/python -m pip install --quiet --upgrade pip
          .venv/bin/python -m pip install --quiet -r requirements.txt
          .venv/bin/python -m pip install --quiet pytest pytest-asyncio pytest-cov anyio

      - name: Pre-flight environment heal
        run: |
          # Ensure test DB exists and is migrated
          docker exec osnit-postgres-1 psql -U lycan -c "CREATE DATABASE lycan_test;" 2>/dev/null || true
          docker exec osnit-postgres-1 psql -U lycan lycan_test -c 'CREATE EXTENSION IF NOT EXISTS "uuid-ossp";' 2>/dev/null || true
          .venv/bin/python -m alembic upgrade head 2>/dev/null || true
          # Flush stale queue items that live workers may have left
          docker exec osnit-dragonfly-1 redis-cli FLUSHDB 2>/dev/null || true

      - name: Run tests
        run: |
          .venv/bin/python -m pytest tests/ \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=45 \
            -v --tb=short

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_number }}
          path: coverage.xml
          retention-days: 30

  # ── 3. Self-Heal (only on test failure) ──────────────────────────────────────
  self-heal:
    name: Self-Heal
    runs-on: [self-hosted, lycan]
    needs: test
    if: failure()
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          .venv/bin/python -m pip install --quiet -r requirements.txt
          .venv/bin/python -m pip install --quiet pytest pytest-asyncio pytest-cov anyio

      - name: Diagnose and heal
        run: .venv/bin/python scripts/selfheal.py

  # ── 4. Import sanity ─────────────────────────────────────────────────────────
  import-check:
    name: Import Sanity
    runs-on: [self-hosted, lycan]
    steps:
      - uses: actions/checkout@v4

      - name: Install core deps
        run: |
          .venv/bin/python -m pip install --quiet -r requirements.txt

      - name: Check all modules import cleanly
        run: .venv/bin/python scripts/check_imports.py
        continue-on-error: true
