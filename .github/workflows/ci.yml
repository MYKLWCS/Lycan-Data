name: CI

on:
  push:
    branches: ["master", "main", "dev/**", "feature/**"]
  pull_request:
    branches: ["master", "main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: "postgresql+asyncpg://lycan:lycan@localhost:5432/lycan_test"
  REDIS_URL: "redis://localhost:6379/0"
  SECRET_KEY: "ci-test-secret-key-not-for-production"
  ENVIRONMENT: "test"
  PYTHONPATH: "."

jobs:
  # ── 1. Lint ───────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: [self-hosted, lycan]
    steps:
      - uses: actions/checkout@v6

      - name: Bootstrap venv
        run: |
          [ -f .venv/bin/python ] || python3 -m venv .venv
          .venv/bin/python -m pip install --quiet --upgrade pip ruff

      - name: Ruff lint
        run: .venv/bin/python -m ruff check . --output-format=github

      - name: Ruff format check
        run: .venv/bin/python -m ruff format --check .

  # ── 2. Tests + Coverage ───────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: [self-hosted, lycan]
    steps:
      - uses: actions/checkout@v6

      - name: Bootstrap venv
        run: |
          [ -f .venv/bin/python ] || python3 -m venv .venv
          .venv/bin/python -m pip install --quiet --upgrade pip

      - name: Install dependencies
        run: |
          .venv/bin/python -m pip install --quiet -r requirements.txt
          .venv/bin/python -m pip install --quiet pytest pytest-asyncio pytest-cov anyio

      - name: Setup test database
        run: |
          docker exec osnit-postgres-1 psql -U lycan -c "ALTER USER lycan WITH PASSWORD 'lycan';" 2>/dev/null || true
          docker exec osnit-postgres-1 psql -U lycan -c "CREATE DATABASE lycan_test;" 2>/dev/null || true
          docker exec osnit-postgres-1 psql -U lycan lycan_test -c "CREATE EXTENSION IF NOT EXISTS vector;" 2>/dev/null || true
          docker exec osnit-postgres-1 psql -U lycan lycan_test -c 'CREATE EXTENSION IF NOT EXISTS "uuid-ossp";' 2>/dev/null || true
          .venv/bin/python -m alembic upgrade head 2>/dev/null || true
          docker exec osnit-dragonfly-1 redis-cli FLUSHDB 2>/dev/null || true

      - name: Clean stale coverage data
        run: rm -f .coverage .coverage.*

      - name: Run tests
        run: |
          .venv/bin/python -m pytest tests/ \
            --ignore=tests/test_integration.py \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=100 \
            -q --tb=short

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ github.run_number }}
          path: coverage.xml
          retention-days: 30

  # ── 3. Security scan ─────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: [self-hosted, lycan]
    steps:
      - uses: actions/checkout@v6

      - name: Bootstrap venv
        run: |
          [ -f .venv/bin/python ] || python3 -m venv .venv
          .venv/bin/python -m pip install --quiet --upgrade pip bandit pip-audit

      - name: Bandit static analysis
        run: |
          .venv/bin/python -m bandit -r . \
            --exclude .venv,tests,migrations,scripts \
            --severity-level medium \
            --format github 2>&1 || true

      - name: Dependency vulnerability check
        run: .venv/bin/python -m pip_audit --requirement requirements.txt --progress-spinner off || true

  # ── 4. Import sanity ─────────────────────────────────────────────────────────
  import-check:
    name: Import Sanity
    runs-on: [self-hosted, lycan]
    steps:
      - uses: actions/checkout@v6

      - name: Bootstrap venv
        run: |
          [ -f .venv/bin/python ] || python3 -m venv .venv
          .venv/bin/python -m pip install --quiet --upgrade pip

      - name: Install dependencies
        run: .venv/bin/python -m pip install --quiet -r requirements.txt

      - name: Check all modules import cleanly
        run: .venv/bin/python scripts/check_imports.py
        continue-on-error: true
