name: CI

on:
  push:
    branches: ["master", "main", "dev/**", "feature/**"]
  pull_request:
    branches: ["master", "main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── 1. Lint & Static Analysis ─────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: [self-hosted, lycan]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint
        run: ruff check . --output-format=github

      - name: Ruff format check
        run: ruff format --check .

  # ─── 2. Tests ───────────────────────────────────────────────────────────────
  test:
    name: Tests (Python 3.12)
    # Self-hosted runner has PostgreSQL, Dragonfly, MeiliSearch already running
    runs-on: [self-hosted, lycan]
    env:
      DATABASE_URL: "postgresql+asyncpg://lycan:lycan@localhost:5432/lycan_test"
      REDIS_URL: "redis://localhost:6379/0"
      MEILI_URL: "http://localhost:7700"
      MEILI_MASTER_KEY: ""
      SECRET_KEY: "ci-test-secret-key-not-for-production"
      ENVIRONMENT: "test"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt 2>/dev/null || \
          pip install fastapi sqlalchemy asyncpg alembic pydantic pydantic-settings \
            redis httpx beautifulsoup4 phonenumbers python-dateutil aiofiles networkx stem \
            pytest pytest-asyncio pytest-cov anyio

      - name: Create test database if missing
        run: |
          docker exec osnit-postgres-1 psql -U lycan -c "CREATE DATABASE lycan_test;" 2>/dev/null || true
          alembic upgrade head 2>/dev/null || true

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-omit="tests/*,migrations/*,scripts/*" \
            -v --tb=short \
            --ignore=tests/test_crawlers \
            --ignore=tests/test_darkweb \
            --ignore=tests/test_government \
            -k "not integration and not playwright"

  # ─── 3. Import Sanity Check ─────────────────────────────────────────────────
  import-check:
    name: Import Sanity
    runs-on: [self-hosted, lycan]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install core deps
        run: |
          pip install --upgrade pip
          pip install fastapi pydantic pydantic-settings sqlalchemy asyncpg \
            redis httpx beautifulsoup4 phonenumbers python-dateutil aiofiles networkx stem

      - name: Check modules import cleanly
        run: python scripts/check_imports.py
        continue-on-error: true
