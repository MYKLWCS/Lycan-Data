name: Audit

on:
  schedule:
    - cron: "0 8 * * 1"   # Every Monday 08:00 UTC
  workflow_dispatch:        # Manual trigger

env:
  PYTHONPATH: "."

jobs:
  audit:
    name: Codebase Audit
    runs-on: [self-hosted, lycan]
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install audit dependencies
        run: .venv/bin/python -m pip install --quiet anthropic PyGithub

      - name: Run system audit
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: .venv/bin/python scripts/audit.py

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-report-${{ github.run_number }}
          path: audit_report.md
          retention-days: 90

  health-check:
    name: Health Check
    runs-on: [self-hosted, lycan]
    needs: audit
    if: always()
    env:
      DATABASE_URL: "postgresql+asyncpg://lycan:lycan@localhost:5432/lycan_test"
      REDIS_URL: "redis://localhost:6379/0"
      MEILI_URL: "http://localhost:7700"
      MEILI_MASTER_KEY: ""
      SECRET_KEY: "audit-health-check-key"
      ENVIRONMENT: "test"

    steps:
      - uses: actions/checkout@v4

      - name: Install test deps
        run: |
          .venv/bin/python -m pip install --quiet -r requirements.txt
          .venv/bin/python -m pip install --quiet pytest pytest-asyncio pytest-cov anyio

      - name: Run health report
        run: .venv/bin/python scripts/selfheal.py --report
