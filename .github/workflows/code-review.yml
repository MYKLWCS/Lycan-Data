name: Code Review

on:
  push:
    branches: ["master", "main", "dev/**", "feature/**"]
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: "0 */2 * * *"  # Every 2 hours
  issue_comment:
    types: [created]
  workflow_dispatch:

concurrency:
  group: code-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gemini-review:
    name: Gemini Code Review
    if: >
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       contains(github.event.comment.body, '/review'))
    runs-on: [self-hosted, lycan]
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Collect content for review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          PR_ISSUE_URL: ${{ github.event.issue.pull_request.url }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ] || \
             ( [ "$EVENT_NAME" = "issue_comment" ] && \
               [ -n "$PR_ISSUE_URL" ] ); then
            gh pr diff "$PR_NUMBER" > /tmp/review_content.txt 2>/dev/null || true
            [ -s /tmp/review_content.txt ] || echo "(no changes to review)" > /tmp/review_content.txt
          else
            {
              printf '# LYCAN CODEBASE AUDIT\n'
              printf '# Collected: %s\n\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              find . -name "*.py" \
                -not -path "./tests/*" \
                -not -path "./__pycache__/*" \
                -not -path "./.git/*" \
                -not -path "./migrations/*" \
                | sort \
                | while IFS= read -r f; do
                    printf '\n\n=== %s ===\n' "$f"
                    cat "$f"
                  done
            } > /tmp/review_content.txt
          fi

      - name: Run Gemini review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python3 scripts/gemini_review.py /tmp/review_content.txt /tmp/review_output.md

      - name: Upload review as artifact
        uses: actions/upload-artifact@v4
        with:
          name: code-review-${{ github.run_number }}
          path: /tmp/review_output.md
          retention-days: 14

      - name: Post PR comment (PRs only)
        if: github.event_name == 'pull_request' || github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ github.event.pull_request.number || github.event.issue.number }}
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          printf '## Automated Code Review\n\n' > /tmp/comment.md
          cat /tmp/review_output.md >> /tmp/comment.md
          printf '\n\n---\n*Reviewed by Gemini on `%s`*\n' "$TIMESTAMP" >> /tmp/comment.md
          gh pr comment "$PR_NUM" --body-file /tmp/comment.md
